name: ReqRes API CI/CD - E2E Chaining Tests

on:
  push:
    branches:
      - main

jobs:
  api-e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Newman
        run: npm install -g newman

      - name: Install HTML Extra Reporter
        run: npm install -g newman-reporter-htmlextra

      - name: Create timestamp for report
        run: echo "REPORT_TIME=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Run E2E API Chaining Tests
        run: |
          newman run collections/ReqRes_Collection.json \
          -e environments/QA_Environment.json \
          -r cli,htmlextra \
          --reporter-htmlextra-export reports/e2e_report_${{ env.REPORT_TIME }}.html

      - name: Upload Test Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-api-report-${{ env.REPORT_TIME }}
          path: reports/