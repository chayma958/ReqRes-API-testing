name: Newman API Tests

on:
  push:
    branches:
      - main

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Newman
        run: npm install -g newman

      - name: Install HTML Extra Reporter
        run: npm install -g newman-reporter-htmlextra

      - name: Create timestamp
        run: echo "REPORT_DATE=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Run Postman Collection
        run: |
          newman run collections/ReqRes_Collection.json \
          -e environments/QA_Environment.json \
          -r cli,htmlextra \
          --reporter-htmlextra-export reports/report_${{ env.REPORT_DATE }}.html

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: newman-report-${{ env.REPORT_DATE }}
          path: reports/